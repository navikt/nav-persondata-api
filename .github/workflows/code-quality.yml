name: Kodekvalitet

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  ktlint:
    name: Kotlin linting (ktlint)
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6

      - name: Sett opp Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gjør Gradle kjørbar
        run: chmod +x ./gradlew

      - name: Kjør ktlint
        run: ./gradlew spotlessCheck

  bygg:
    name: Bygg prosjekt
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6

      - name: Sett opp Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gjør Gradle kjørbar
        run: chmod +x ./gradlew

      - name: Kjør bygg
        run: ./gradlew build

  sonarcloud:
    name: SonarCloud analyse
    runs-on: ubuntu-latest
    needs: bygg
    continue-on-error: true

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sett opp Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gjør Gradle kjørbar
        run: chmod +x ./gradlew

      - name: Kjør SonarCloud analyse
        run: ./gradlew test jacocoTestReport sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
