name: Dependabot Automerge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      github.actor == 'dependabot[bot]' &&
      github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk for major version bump
        id: check_version
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr || !pr.title) return;
            const match = pr.title.match(/bump.+from\s+v?(\d+)\.(\d+)\.(\d+).*to\s+v?(\d+)\.(\d+)\.(\d+)/i);
            if (match && match[1] !== match[4]) {
              core.setFailed('Major version bump oppdaget – hopper over automerge.');
            }

      - name: Varsle Slack om blokkert major bump
        if: failure() && steps.check_version.outcome == 'failure'
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const text = `:warning: Major version bump blokkert for review: <${pr.html_url}|${pr.title}>`;
            const resp = await fetch(process.env.SLACK_WEBHOOK_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text })
            });
            if (!resp.ok) {
              throw new Error(`Slack webhook feilet: ${resp.status} ${await resp.text()}`);
            }

      - name: Aktiver automerge
        if: success()
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  slack-notify-merge:
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Varsle Slack om merget Dependabot-PR
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const text = `:white_check_mark: Dependabot PR merget til main: <${pr.html_url}|${pr.title}>`;
            const resp = await fetch(process.env.SLACK_WEBHOOK_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text })
            });
            if (!resp.ok) {
              throw new Error(`Slack webhook feilet: ${resp.status} ${await resp.text()}`);
            }
