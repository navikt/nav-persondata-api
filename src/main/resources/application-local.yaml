application:
  name: nav-persondata-api
server:
  port: 8080
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
spring:
  config:
    # .env.local.properties kan brukes for å overstyre enkeltverdier lokalt (f.eks. ekte PDL-URL).
    # Filen er git-ignorert. Ikke nødvendig for WireMock-basert lokal kjøring.
    import: "optional:file:./src/main/resources/.env.local.properties"
  codec:
    max-in-memory-size: 5MB
management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.client.requests: true
  tags:
    application: nav-persondata-api
    env: ${NAIS_CLUSTER_NAME:local}
  endpoint:
    health:
      show-details: always
no.nav.security.jwt:
  issuer:
    azuread:
      discoveryurl: ${AZURE_APP_WELL_KNOWN_URL:http://localhost:8090/azuread/.well-known/openid-configuration}
      accepted_audience: nav-persondata-api

VALKEY_HOST_NAV_PERSONDATA_API: localhost
VALKEY_PORT_NAV_PERSONDATA_API: 6379
VALKEY_USERNAME_NAV_PERSONDATA_API: ""
VALKEY_PASSWORD_NAV_PERSONDATA_API: ""

AZURE_APP_CLIENT_ID: dummy-test-client-id
AZURE_APP_CLIENT_SECRET: dummy-test-client-secret

