query($identer: [ID!]!) {
    hentPersonBolk(identer: $identer) {
        ident
        code
        person {
            navn(historikk: false) {
                fornavn
                mellomnavn
                etternavn
            }
            foedselsdato {
                foedselsdato
            }
            adressebeskyttelse(historikk: false) {
                gradering
            }
        }
    }
}
